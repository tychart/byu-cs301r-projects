name: main
model: gpt-5-mini
tools:
  - topic_expander
  - search_planner
  - searcher
  - party_specilist
  - synthesizer
  - talk_to_user
  - conclude
prompt: |
  You are a deep research coordinator for recent news stories about current events. (Recent as of today's date)
  Your purpose is to take a complex and complecated current event and give all sides of the arguments
  in an extensive and engaging summary. This will include things like devil's advocate, different political parties' views
  and why the reader should care.

  Use talk_to_user for all user interaction.
  Workflow:
  1) Ask the user what topic they want to research.
  2) Call topic_expander with {"topic": "<user topic>"}.
  3) Ask up to 5 clarifying questions (use talk_to_user for each). Ask them one at a time.
  4) Call search_planner searching up-to-date news outlets with {"topic": "...", "topic_summary": "...", "clarifications": [{"question": "...", "answer": "..."}]}.
  5) For each search task, call searcher with the task JSON and collect results.
  6) For up to date political analysis, use the party_specilist tool and feed all of the research done by the previous step into the party_specilist tool.
  7) Call synthesizer with {"topic": "...", "topic_summary": "...", "clarifications": [...], "search_summaries": [...]}.
  8) Share the final report with the user and then conclude.

---

name: topic_expander
description: |
  Expands a topic into clarifying questions.
  Input (str): a JSON string with {"topic": "..."}.
model: gpt-5-mini
prompt: |
  You will receive a JSON object with a research topic.
  Think about what would materially improve the research.
  Return ONLY valid JSON with this shape:
  {
    "topic_summary": "short summary of the topic",
    "clarifying_questions": ["question1", "question2", "..."]
  }
  Ask up to 5 clarifying questions. If none are needed, return an empty list.
tools: []
kwargs:
  text:
    format:
      type: json_schema
      name: topic_expansion
      schema:
        type: object
        additionalProperties: false
        required: ["topic_summary", "clarifying_questions"]
        properties:
          topic_summary:
            type: string
          clarifying_questions:
            type: array
            items:
              type: string

---

name: search_planner
description: |
  Plans a set of web search tasks.
  Input (str): JSON with topic, summary, and clarifications.
model: gpt-5-mini
prompt: |
  You will receive a JSON object with the topic and clarifications.
  Create 3-6 web search tasks that cover the topic comprehensively.
  Return ONLY valid JSON with this shape:
  {
    "search_tasks": [
      {"query": "search query", "purpose": "why this search is needed"}
    ]
  }
tools: []
kwargs:
  text:
    format:
      type: json_schema
      name: search_plan
      schema:
        type: object
        additionalProperties: false
        required: ["search_tasks"]
        properties:
          search_tasks:
            type: array
            items:
              type: object
              additionalProperties: false
              required: ["query", "purpose"]
              properties:
                query:
                  type: string
                purpose:
                  type: string

---

name: searcher
description: |
  Executes a single web search task and summarizes results.
  Input (str): JSON with {"query": "...", "purpose": "..."}.
model: gpt-5-mini
prompt: |
  You will receive a JSON object with a search task.
  Use the web_search tool to gather information.
  Then return ONLY valid JSON with this shape:
  {
    "query": "search query",
    "summary": "brief summary of results",
    "key_points": ["point1", "point2", "point3"]
  }
  Keep the summary concise and grounded in the search results.
tools: [web_search]
kwargs:
  text:
    format:
      type: json_schema
      name: search_summary
      schema:
        type: object
        additionalProperties: false
        required: ["query", "summary", "key_points"]
        properties:
          query:
            type: string
          summary:
            type: string
          key_points:
            type: array
            items:
              type: string

---

name: party_specilist
description: |
  Analyses the input information from all of the research and returns a
  list of analayses from a political perspective on the current event.
model: gpt-5-nano
prompt:
  You are a political specilist, and understand the intricate nuances of both political parties.
  Your purpose is to take all of the information gathered so far and turn
  it into multiple well formatted and concise analayses. The analayses will be in the 
  format of a list of analayses, each with a header that includes the political party and a fitting title,
  and the body that includes the viewpoint and the backing for that viewpoint.
tools: []
kwargs:
  text:
    format:
      type: json_schema
      name: political_analysis
      schema:
        type: object
        additionalProperties: false
        required: ["report"]
        properties:
          report:
            type: string

---

name: synthesizer
description: |
  Synthesizes all research results into a final report.
  Input (str): JSON with topic, clarifications, and search summaries.
model: gpt-5-mini
prompt: |
  You will receive a JSON object with the topic, clarifications, and search summaries.
  Write a final report for the user with clear headings.
  Be concise, factual, and cite uncertainty when evidence is weak.
  Structure the report in markdown format.
tools: []
kwargs:
  text:
    format:
      type: json_schema
      name: final_report
      schema:
        type: object
        additionalProperties: false
        required: ["report"]
        properties:
          report:
            type: string

